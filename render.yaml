# =============================================================================
# Render Blueprint — Infrastructure as Code
# Docs: https://render.com/docs/infrastructure-as-code
#
# Usage:
#   1. Push this file to your GitHub/GitLab repository
#   2. In Render dashboard → New → Blueprint → select your repo
#   3. Render will provision the database and web service automatically
#   4. Set AUTH_SECRET and JWT_SECRET manually in the dashboard after deploy
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Web Service — Next.js application (Docker)
  # ---------------------------------------------------------------------------
  - type: web
    name: kanban-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Render reads PORT from env and routes traffic to it
    port: 3000

    # Health check — Render uses this to confirm the service is up
    healthCheckPath: /

    # Auto-deploy on every push to the main branch
    autoDeploy: true

    envVars:
      # Injected automatically from the managed PostgreSQL database below
      - key: DATABASE_URL
        fromDatabase:
          name: kanban-db
          property: connectionString

      # App URL — update after first deploy with your actual .onrender.com URL
      - key: NEXT_PUBLIC_APP_URL
        value: https://kanban-app.onrender.com

      - key: NODE_ENV
        value: production

      - key: JWT_EXPIRATION_DAYS
        value: "7"

      # Set these manually in Render dashboard after first deploy:
      # Dashboard → kanban-app → Environment → Add Environment Variable
      # Generate with: openssl rand -base64 32
      - key: AUTH_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false

# -----------------------------------------------------------------------------
# Managed PostgreSQL database
# -----------------------------------------------------------------------------
databases:
  - name: kanban-db
    databaseName: kanban_db
    user: kanban_user
    # plan: free   # uncomment to use the free tier (limited to 256 MB)
